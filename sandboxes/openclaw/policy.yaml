# OpenClaw sandbox network & filesystem policy
#
# Covers: Anthropic, OpenAI, Google, Telegram, Slack (REST + Socket Mode),
#         GitHub, npm/PyPI registries, Brave Search, OpenRouter, LinkedIn.
#
# Apply:   openshell policy set <sandbox> --policy policy.yaml --wait
# Verify:  openshell logs <sandbox> --level warn --since 5m
# Reload:  Edit this file, re-run `openshell policy set`

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /opt/openclaw-config
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:

  # ═══ LLM Providers ═══════════════════════════════════

  anthropic:
    name: anthropic
    endpoints:
      - host: api.anthropic.com
        port: 443
        tls: skip
        enforcement: audit
      - host: statsig.anthropic.com
        port: 443
        enforcement: audit
      - host: sentry.io
        port: 443
        enforcement: audit
      - host: platform.claude.com
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/claude }

  openai:
    name: openai
    endpoints:
      - host: api.openai.com
        port: 443
        tls: skip
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }

  google:
    name: google
    endpoints:
      - host: "*.googleapis.com"
        port: 443
        enforcement: audit
      - host: "*.google.com"
        port: 443
        enforcement: audit
      - host: "*.googleusercontent.com"
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  # ═══ Messaging Channels ═════════════════════════════

  telegram:
    name: telegram
    endpoints:
      - host: "*.telegram.org"
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }

  # Slack REST API — explicit per-subdomain entries.
  #
  # ⚠️  Do NOT use a *.slack.com wildcard here. On OpenShell ≤ 0.0.15 a
  #     wildcard match takes priority over the more-specific slack_websocket
  #     policy below, causing WS connections to hit the wrong TLS mode and
  #     break the Socket Mode frame stream.
  slack:
    name: slack
    endpoints:
      - host: slack.com
        port: 443
        enforcement: audit
      - host: api.slack.com
        port: 443
        enforcement: audit
      - host: files.slack.com
        port: 443
        enforcement: audit
      - host: hooks.slack.com
        port: 443
        enforcement: audit
      - host: edgeapi.slack.com
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }

  # Separate policy for Slack WebSocket (Socket Mode).
  #
  # tls: skip forces raw TCP passthrough — without it the L7 proxy
  # intercepts the TLS handshake and breaks the WebSocket upgrade.
  # enforcement: enforce because this carries live Socket Mode traffic.
  slack_websocket:
    name: slack_websocket
    endpoints:
      - host: wss-primary.slack.com
        port: 443
        tls: skip
        enforcement: enforce
      - host: wss-backup.slack.com
        port: 443
        tls: skip
        enforcement: enforce
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  # ═══ Code & Package Registries ══════════════════════

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        enforcement: audit
      - host: api.github.com
        port: 443
        enforcement: audit
      - host: "*.ghcr.io"
        port: 443
        enforcement: audit
      - host: formulae.brew.sh
        port: 443
        enforcement: audit
      - host: "*.githubusercontent.com"
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/git }
      - { path: /usr/bin/gh }
      - { path: /usr/bin/curl }

  registries:
    name: registries
    endpoints:
      - host: registry.npmjs.org
        port: 443
        enforcement: audit
      - host: pypi.org
        port: 443
        enforcement: audit
      - host: files.pythonhosted.org
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/npm }
      - { path: /usr/bin/pip }
      - { path: /usr/bin/pip3 }
      - { path: /usr/bin/curl }

  # ═══ Web Search & Fetch ═════════════════════════════

  brave:
    name: brave-search
    endpoints:
      - host: api.search.brave.com
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }

  openrouter:
    name: openrouter
    endpoints:
      - host: openrouter.ai
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }

  # Per-site web access for web_fetch / web_search tools.
  # TLD wildcards (*.com) cause OPA errors — use subdomain wildcards.
  linkedin:
    name: linkedin
    endpoints:
      - host: "*.linkedin.com"
        port: 443
        enforcement: audit
      - host: linkedin.com
        port: 443
        enforcement: audit
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }
