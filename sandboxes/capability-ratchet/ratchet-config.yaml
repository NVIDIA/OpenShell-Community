# Capability Ratchet sidecar configuration for NemoClaw sandboxes.
#
# The sidecar sits between the NemoClaw proxy and the real inference backend,
# analyzing each request for taint (private/untrusted data in context) and
# blocking or sandboxing tool calls that would violate the ratchet policy.

upstream:
  url: https://api.anthropic.com/v1       # Real inference backend
  api_key_env: ANTHROPIC_API_KEY           # Env var containing the API key
  # model: claude-sonnet-4                 # Optional model override

policy_file: /app/policy.yaml              # Capability ratchet policy

listen:
  host: 127.0.0.1
  port: 4001

bash_ast_socket: /tmp/bash-ast.sock        # Optional — falls back to shlex
shadow_mode: false                         # Set to true for log-only mode
