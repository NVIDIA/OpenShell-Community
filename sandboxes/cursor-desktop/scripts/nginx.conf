#
# nginx config for the cursor-desktop noVNC front-end.
# Designed to run as the non-root sandbox user:
#   - No `user` directive (inherits the process owner)
#   - All writable paths are under /tmp
#
# HTTP traffic flow:
#   Browser → nginx:6080 → serves /usr/share/novnc/ static files
#                        → proxies ws:6080/websockify → websockify:5902 → x11vnc:5901

# No user directive — process runs as whoever started it (sandbox).
worker_processes 1;

pid       /tmp/nginx.pid;
error_log /tmp/nginx-error.log warn;

# All temp directories must be writable by the sandbox user.
# nginx refuses to start if it cannot write to these.

events {
    worker_connections 64;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /tmp/nginx-access.log;

    # Temp dirs — keep everything in /tmp so sandbox user can write them.
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    server {
        listen 6080;
        server_name _;

        root  /usr/share/novnc;
        index index.html;

        # Serve noVNC static assets; fall back to index.html so that
        # bare "/" requests (which websockify rejects as directory paths)
        # correctly return the custom Cursor Desktop page.
        location / {
            try_files $uri /index.html;
        }

        # Proxy WebSocket connections to the internal websockify instance.
        # The noVNC client connects to ws://<host>:6080/websockify.
        location /websockify {
            proxy_pass         http://127.0.0.1:5902;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
