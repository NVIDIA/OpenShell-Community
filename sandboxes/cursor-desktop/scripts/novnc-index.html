  Minimal noVNC index for cursor-desktop.
  Connects directly to the VNC session with no toolbar, no connection dialog,
  and no UI chrome — the VNC desktop fills the entire browser window.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Desktop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
        #screen { width: 100%; height: 100%; }
        #status {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #ccc; font: 13px monospace;
            padding: 6px 14px; border-radius: 6px; pointer-events: none;
            opacity: 1; transition: opacity 1s;
        }
        #status.hidden { opacity: 0; }
    </style>
</head>
<body>
    <div id="screen"></div>
    <div id="status">Connecting…</div>

    <script type="module">
        import RFB from '/core/rfb.js';

        const status  = document.getElementById('status');
        const screen  = document.getElementById('screen');
        let   connected = false;
        let   retryTimer = null;

        function showStatus(msg) {
            status.textContent = msg;
            status.classList.remove('hidden');
        }
        function hideStatus() {
            status.classList.add('hidden');
        }

        function connect() {
            clearTimeout(retryTimer);
            const host = window.location.hostname;
            const port = window.location.port;
            const url  = `ws://${host}:${port}/websockify`;

            if (!connected) showStatus('Connecting…');

            const rfb = new RFB(screen, url);

            // Scale the remote desktop to fill the browser window.
            rfb.scaleViewport = true;
            // Do not ask the remote session to resize — Cursor has a fixed window.
            rfb.resizeSession = false;

            rfb.addEventListener('connect', () => {
                connected = true;
                hideStatus();
                rfb.focus();
            });

            rfb.addEventListener('disconnect', () => {
                // Reconnect quickly and silently — transient disconnects during
                // startup (e.g. x11vnc WebSocket detection false-positives) should
                // be invisible to the user. Only show a status message if the
                // session was previously established and then dropped.
                if (connected) {
                    connected = false;
                    showStatus('Reconnecting…');
                }
                retryTimer = setTimeout(connect, 1000);
            });

            rfb.addEventListener('credentialsrequired', () => {
                // VNC is password-free inside the sandbox; this should not fire.
                rfb.sendCredentials({ password: '' });
            });
        }

        connect();
    </script>
</body>
</html>
